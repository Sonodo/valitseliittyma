name: Weekly data check

on:
  schedule:
    - cron: '0 5 * * 1' # Mondays 05:00 UTC (~08:00 Helsinki)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  data-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync Adtraction partner offers
        id: adtraction
        env:
          ADTRACTION_API_TOKEN: ${{ secrets.ADTRACTION_API_TOKEN }}
          ADTRACTION_CHANNEL_ID: '2066470020'
        run: |
          set +e
          node scripts/adtraction-sync.mjs | tee adtraction-report.txt
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit partner-offer updates
        if: steps.adtraction.outputs.code == '0'
        run: |
          if ! git diff --quiet src/data/partner-offers.json src/data/adtraction-programs.json; then
            git config user.name "sonodo-datavahti"
            git config user.email "bot@users.noreply.github.com"
            git add src/data/partner-offers.json src/data/adtraction-programs.json
            git commit -m "Kumppanikampanjoiden viikkosynkka (Adtraction)"
            git push
          fi

      - name: Run drift & freshness check
        id: check
        run: |
          set +e
          node scripts/weekly-data-check.mjs | tee drift-report.md
          echo "code=$?" >> "$GITHUB_OUTPUT"

      - name: Append Adtraction program changes to report
        id: progchange
        run: |
          set +e
          if [ -f adtraction-report.txt ] && grep -qE "PROGRAM-CHANGE" adtraction-report.txt; then
            echo "" >> drift-report.md
            echo "## Adtraction-ohjelmamuutokset" >> drift-report.md
            grep -E "PROGRAM-CHANGE" adtraction-report.txt >> drift-report.md || true
            echo "found=1" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Open or update drift issue
        if: steps.check.outputs.code == '2' || steps.progchange.outputs.found == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create data-drift --color D93F0B --description "Automaattinen datavahti havaitsi poikkeaman" --force
          existing=$(gh issue list --label data-drift --state open --json number --jq '.[0].number' || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file drift-report.md
          else
            gh issue create --title "Datavahti: poikkeama havaittu ($(date -u +%d.%m.%Y))" --label data-drift --body-file drift-report.md
          fi

      - name: Fail on drift
        if: steps.check.outputs.code == '2'
        run: exit 1
